<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <title>Previsão do tempo</title>
  </head>
  <body>
    <div class="fundo">
      <div class="container">
        <form>
          <input type="text" class="form__input" placeholder="Informe uma cidade, e clique na lupa" />
          <button type="button" class="form__botao"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        <div class="cidade">
          <h1></h1>
        </div>
        <div class="previsao-destaque">
          <div class="icone-destaque"><img class="icone-maior" src="" alt="" /></div>
          <div class="temperatura-destaque">
            <h2></h2>
            <p></p>
          </div>
        </div>
        <div class="temperatura__maxima">
          <i class="fa-solid fa-temperature-full"></i>
          <div>
            <h3></h3>
            <p>Máxima</p>
          </div>
        </div>
        <div class="temperatura__minima">
          <i class="fa-solid fa-temperature-low"></i>
          <div>
            <h3></h3>
            <p>Mínima</p>
          </div>
        </div>
        <div class="sensacao">
          <i class="fa-solid fa-temperature-high claro"></i>
          <p>Sensação</p>
          <h4 class="titulo"></h4>
        </div>
        <div class="umidade">
          <i class="fa-solid fa-droplet claro"></i>
          <p>Umidade</p>
          <h4 class="titulo"></h4>
        </div>
        <div class="vento">
          <i class="fa-solid fa-wind claro"></i>
          <p>Vento</p>
          <h4 class="titulo"></h4>
        </div>
        <div class="dica">
          <h4></h4>
        </div>
      </div>
      <!-- <div class="teste"><img src="" alt="" /></div> -->
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
